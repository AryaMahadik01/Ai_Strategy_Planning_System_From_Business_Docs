<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>StrategixAI | Enterprise Strategy Intelligence</title>
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo1.png') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    </head>
<body>

<div class="app-container">

    {% if session.get('user') %}
        {% include "layout/sidebar.html" %}
    {% endif %}

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

</div>

<div id="ai-loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
    
    <div style="position: relative; margin-bottom: 30px;">
        <div class="ai-glow-ring"></div>
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="StrategixAI" style="width: 80px; position: relative; z-index: 2; animation: ai-pulse 2s infinite alternate;">
    </div>
    
    <h3 style="color: #ffffff; margin: 0 0 15px 0; font-family: 'Helvetica', sans-serif; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; font-size: 18px;">
        StrategixAI Engine
    </h3>
    
    <div style="width: 250px; height: 3px; background: #334155; border-radius: 4px; overflow: hidden; margin-bottom: 15px;">
        <div class="ai-scan-line"></div>
    </div>
    
    <p id="ai-status-text" style="color: #818cf8; font-family: monospace; font-size: 14px; margin: 0; min-height: 20px;">
        Initializing neural analysis...
    </p>
</div>

<style>
    /* Makes your logo gently pulse in size */
    @keyframes ai-pulse {
        0% { transform: scale(0.95); filter: drop-shadow(0 0 10px rgba(79, 70, 229, 0.3)); }
        100% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(79, 70, 229, 0.8)); }
    }

    /* Creates a radar-like scanning line */
    @keyframes scan-animate {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250px); }
    }
    
    .ai-scan-line {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #4f46e5, #10b981, transparent);
        animation: scan-animate 1.5s infinite linear;
    }

    /* The rotating ambient glow behind the logo */
    @keyframes spin-glow {
        100% { transform: rotate(360deg); }
    }
    
    .ai-glow-ring {
        position: absolute;
        top: -20px; left: -20px; right: -20px; bottom: -20px;
        background: conic-gradient(from 0deg, transparent, rgba(79, 70, 229, 0.2), transparent 50%);
        border-radius: 50%;
        animation: spin-glow 3s infinite linear;
        z-index: 1;
    }
</style>

<script>
    function showLoadingOverlay() {
        // 1. Show the overlay
        document.getElementById('ai-loading-overlay').style.display = 'flex';
        
        // 2. The array of realistic AI processing steps
        const aiSteps = [
            "Extracting document text and metadata...",
            "Running NLP contextual analysis...",
            "Evaluating internal strengths & weaknesses...",
            "Scanning macro-environmental PESTLE factors...",
            "Synthesizing high-priority execution roadmap...",
            "Formatting executive board report...",
            "Finalizing strategy models..."
        ];
        
        // 3. Cycle through the text every 2.5 seconds
        let stepIndex = 0;
        const statusElement = document.getElementById('ai-status-text');
        
        setInterval(() => {
            if (stepIndex < aiSteps.length) {
                statusElement.innerText = aiSteps[stepIndex];
                stepIndex++;
            }
        }, 2500); // Changes text every 2.5 seconds
    }
</script>

</body>
</html>
