{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; background: whitesmoke; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-top: 0; color: #1e293b;">Forgot Password</h2>
    <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Enter your email address and we'll send you a secure link to reset your password.</p>
    
    <form method="POST" action="/forgot_password">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #334155;">Email Address</label>
            <input type="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px;">
        </div>
        <button type="submit" style="width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Send Reset Link</button>
    </form>
    <div style="margin-top: 15px; text-align: center;">
        <a href="/login" style="color: #4f46e5; text-decoration: none; font-size: 14px;">Back to Login</a>
    </div>
</div>
{% endblock %}
